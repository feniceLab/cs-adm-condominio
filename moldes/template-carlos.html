<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS · Template Carlos (feed + story)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Questrial&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--azul:#38B8D8;--ocean:#0070B8;--grafite:#0F1B24;--branco:#F8F8F8;--fd:'Questrial',sans-serif;--fc:'Inter',sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0b1116;display:flex;justify-content:center;padding:24px;font-family:var(--fc)}
  .frame{transform-origin:top center;transform:scale(.42)}
  body.render{padding:0;background:none}
  body.render .frame{transform:none}

  .art{position:relative;overflow:hidden;background:var(--grafite);border-radius:4px}
  .art.story{width:1080px;height:1920px}
  .art.feed{width:1080px;height:1350px}
  .art.square{width:1080px;height:1080px}

  .bg{position:absolute;inset:0;background-size:cover;background-position:center right}
  .veil{position:absolute;inset:0;background:
     linear-gradient(90deg, rgba(15,27,36,.97) 0%, rgba(15,27,36,.9) 34%, rgba(15,27,36,.42) 58%, rgba(15,27,36,.06) 82%, rgba(15,27,36,0) 100%),
     linear-gradient(180deg, rgba(15,27,36,.5) 0%, rgba(15,27,36,0) 20%, rgba(15,27,36,0) 52%, rgba(15,27,36,.82) 100%)}
  .accent{position:absolute;left:0;top:0;bottom:0;width:14px;background:linear-gradient(180deg,var(--azul),var(--ocean))}

  /* PESSOA */
  .person{position:absolute;right:0;bottom:0;z-index:2}
  .person img{position:absolute;bottom:0;width:auto;object-position:bottom right;filter:drop-shadow(-30px 18px 46px rgba(0,0,0,.6))}
  .art.story  .person{width:760px;height:1620px}
  .art.story  .person img{right:-380px;height:1500px}
  .art.feed   .person{width:720px;height:1200px}
  .art.feed   .person img{right:-360px;height:1250px}
  .art.square .person{width:600px;height:980px}
  .art.square .person img{right:-330px;height:1030px}

  /* TEXTO */
  .content{position:absolute;left:96px;z-index:3}
  .art.story  .content{top:210px;width:430px}
  .art.feed   .content{top:96px;width:470px}
  .art.square .content{top:74px;width:450px}
  .content h1,.content .body{overflow-wrap:break-word}
  .eyebrow{display:inline-flex;align-items:center;gap:16px;font-family:var(--fc);font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:var(--azul)}
  .eyebrow::before{content:'';width:50px;height:3px;background:var(--azul)}
  h1{font-family:var(--fd);color:var(--branco);letter-spacing:-1px;line-height:1.03}
  h1 .hi{color:var(--azul)}
  .body{font-family:var(--fc);font-weight:400;color:#DCE6EC;line-height:1.5}
  .body b{color:#fff;font-weight:700}
  .cta{display:inline-flex;align-items:center;background:var(--azul);color:var(--grafite);font-family:var(--fc);font-weight:700;border-radius:999px}
  /* escalas por formato */
  .art.story  .eyebrow{font-size:25px}
  .art.story  h1{font-size:66px;margin-top:30px}
  .art.story  .body{font-size:32px;margin-top:34px}
  .art.story  .cta{font-size:30px;padding:22px 42px;margin-top:40px}
  .art.feed   .eyebrow{font-size:23px}
  .art.feed   h1{font-size:66px;margin-top:24px}
  .art.feed   .body{font-size:31px;margin-top:28px}
  .art.feed   .cta{font-size:28px;padding:20px 38px;margin-top:32px}
  .art.square .eyebrow{font-size:21px}
  .art.square h1{font-size:54px;margin-top:20px}
  .art.square .body{font-size:27px;margin-top:22px}
  .art.square .cta{font-size:25px;padding:17px 34px;margin-top:26px}

  /* MARCA (rodapé esquerdo) */
  .brand{position:absolute;left:96px;display:flex;align-items:center;gap:20px;z-index:4}
  .brand img{width:auto;filter:drop-shadow(0 2px 10px rgba(0,0,0,.55))}
  .brand .h{font-family:var(--fc);font-weight:600;color:#fff;line-height:1.25}
  .brand .h span{display:block;font-weight:400;color:var(--azul);letter-spacing:.04em}
  .art.story  .brand{bottom:120px}
  .art.feed   .brand{bottom:70px}
  .art.square .brand{bottom:58px}
  .brand img{height:88px}.art.square .brand img{height:74px}
  .brand .h{font-size:28px}.brand .h span{font-size:23px}
  .art.square .brand .h{font-size:24px}.art.square .brand .h span{font-size:20px}
</style>
</head>
<body>
  <div class="frame">
  <div class="art story" id="art">
    <div class="bg" id="bg"></div>
    <div class="veil"></div>
    <div class="accent"></div>
    <div class="person"><img id="foto" src="" alt="Carlos Silva"></div>
    <div class="content">
      <div class="eyebrow" id="eyebrow">CS Administradora</div>
      <h1 id="titulo"></h1>
      <p class="body" id="corpo"></p>
    </div>
    <div class="brand">
      <img src="../assets/brand/logo/cs-simbolo-branco.png" alt="CS">
      <div class="h">CS Administradora<span>@carlossilvaadm</span></div>
    </div>
  </div>
  </div>
  <script>
    const q=new URLSearchParams(location.search);
    const fmt=q.get('fmt')||'story';
    const pieceId=q.get('piece')||'administrada';
    document.getElementById('art').className='art '+fmt;
    if(q.has('r')) document.body.classList.add('render');
    const esc=s=>String(s==null?'':s);
    fetch('../data/templates.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{
      const p=(d.pecas||[]).find(x=>x.id===pieceId)||(d.pecas||[])[0];
      if(!p) return;
      const bg=(d.fundos&&d.fundos[p.fundo])||p.fundo||'';
      document.getElementById('bg').style.backgroundImage="url('"+bg+"')";
      document.getElementById('foto').src=p.foto||'';
      document.getElementById('eyebrow').textContent=p.eyebrow||'';
      document.getElementById('titulo').innerHTML=esc(p.titulo)+(p.titulo_destaque?' <span class="hi">'+esc(p.titulo_destaque)+'</span>':'');
      document.getElementById('corpo').innerHTML=p.corpo||'';
      document.title='CS · '+(p.modelo||pieceId)+' · '+fmt;
    });
  </script>
</body>
</html>
